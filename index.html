<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DND 战利品生成器</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- 左侧控制面板 -->
    <div class="panel">

        <h1>⚔️ DND 战利品生成器</h1>

        <label>怪物</label>
        <select id="corpseType"></select>

        <label>等级</label>
        <input id="level" type="number" value="1">

        <label>检定结果</label>
        <select id="success">
            <option>普通成功</option>
            <option>困难成功</option>
            <option>极难成功</option>
            <option>大成功</option>
        </select>

        <button onclick="searchBody()">🔍 搜索尸体</button>

    </div>

    <!-- 右侧输出 -->
    <div class="output" id="output"></div>

</div>

<script src="app.js"></script>

</body>
</html>
